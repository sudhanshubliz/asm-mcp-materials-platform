services:
  - type: web
    name: asm-materials-mcp
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MCP_TRANSPORT
        value: http
      - key: MCP_HOST
        value: 0.0.0.0
      - key: MATERIALS_API
        value: https://next-gen.materialsproject.org/api
      - key: OQMD_REQUIRED
        value: false
      - key: MCP_REQUIRE_AUTH
        value: false
