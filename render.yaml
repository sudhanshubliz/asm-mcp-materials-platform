services:
  - type: web
    name: mcp_connect
    runtime: python
    buildCommand: pip install --upgrade pip && pip install --no-cache-dir -r requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: MCP_TRANSPORT
        value: http
      - key: MCP_HOST
        value: 0.0.0.0
      - key: MATERIALS_API
        value: https://next-gen.materialsproject.org/api
      - key: MATERIALS_API_MODE
        value: auto
      - key: OQMD_REQUIRED
        value: false
      - key: MCP_REQUIRE_AUTH
        value: false
      - key: SQL_CONNECTION
        value: sqlite+pysqlite:///:memory:
      - key: REQUEST_TIMEOUT
        value: 30
      - key: REQUEST_RETRY_ATTEMPTS
        value: 3
      - key: REQUEST_RETRY_BACKOFF
        value: 0.5
      - key: CACHE_TTL_SECONDS
        value: 3600
